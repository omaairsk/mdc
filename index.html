<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGNOSTIC CENTRE | Financial & Admin Portal</title>
    <!-- Core Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --glass: rgba(13, 18, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #06b6d4; /* Cyan 500 */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            background-color: #050b14;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
        }

        #canvas-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            pointer-events: none;
        }

        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(6, 182, 212, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
            outline: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        .center-layout {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Mono font for numbers */
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-panel { border: 1px solid #ccc !important; background: white !important; color: black !important; box-shadow: none !important; backdrop-filter: none !important; }
            .text-emerald-400, .text-rose-400, .text-sky-400 { color: black !important; }
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: var(--primary);
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sql-block {
            background: #1e293b;
            color: #a5b4fc;
            font-family: 'JetBrains Mono', monospace;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.1);
            white-space: pre-wrap;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- Supabase Config with Safe Fallback ---
        const SUPABASE_URL = "https://ttrxyxrssgzlyforxage.supabase.co";
        const DEFAULT_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cnh5eHJzc2d6bHlmb3J4YWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYwOTYsImV4cCI6MjA5MDI5MjA5Nn0.TuT31Wzr2bHJzbymNLtQ3h-05UV9EU8FLLSebw6qLnY";
        
        // Check local storage for the correct key, otherwise use the default
        const currentAnonKey = localStorage.getItem('mdc_anon_key_v2') || DEFAULT_KEY;
        const supabaseClient = supabase.createClient(SUPABASE_URL, currentAnonKey);

        // --- ENHANCED 3D Background Logic (DNA LAB CENTRE) ---
        const ThreeBackground = () => {
            useEffect(() => {
                const container = document.getElementById('canvas-container');
                if (!container || container.children.length > 0) return;

                const scene = new THREE.Scene();
                // Enhanced fog for depth of field
                scene.fog = new THREE.FogExp2(0x050b14, 0.025);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // Enhanced Lab Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                scene.add(ambientLight);
                const pointLight1 = new THREE.PointLight(0x06b6d4, 2.5, 60); // Cyan
                pointLight1.position.set(15, 10, 10);
                scene.add(pointLight1);
                const pointLight2 = new THREE.PointLight(0x8b5cf6, 2.5, 60); // Purple
                pointLight2.position.set(-15, -10, -10);
                scene.add(pointLight2);
                const pointLight3 = new THREE.PointLight(0x38bdf8, 1.5, 40); // Light Blue
                pointLight3.position.set(0, 0, -20);
                scene.add(pointLight3);

                // Helper Function to Create DNA Strands
                const createDNAStrand = (pairs, radius, step, colorA, colorB, opacity) => {
                    const group = new THREE.Group();
                    const particleGeo = new THREE.SphereGeometry(0.25, 16, 16);
                    const mat1 = new THREE.MeshPhysicalMaterial({ color: colorA, transparent: true, opacity: opacity, roughness: 0.1, metalness: 0.4 });
                    const mat2 = new THREE.MeshPhysicalMaterial({ color: colorB, transparent: true, opacity: opacity, roughness: 0.1, metalness: 0.4 });
                    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: opacity * 0.3 });

                    for (let i = 0; i < pairs; i++) {
                        const t = i * 0.45;
                        const y = (i - pairs / 2) * step;
                        
                        const x1 = Math.sin(t) * radius;
                        const z1 = Math.cos(t) * radius;
                        const sphere1 = new THREE.Mesh(particleGeo, mat1);
                        sphere1.position.set(x1, y, z1);
                        group.add(sphere1);
                        
                        const x2 = Math.sin(t + Math.PI) * radius;
                        const z2 = Math.cos(t + Math.PI) * radius;
                        const sphere2 = new THREE.Mesh(particleGeo, mat2);
                        sphere2.position.set(x2, y, z2);
                        group.add(sphere2);
                        
                        const points = [new THREE.Vector3(x1, y, z1), new THREE.Vector3(x2, y, z2)];
                        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                        const line = new THREE.Line(lineGeo, lineMat);
                        group.add(line);
                    }
                    return group;
                };

                // 1. Main Focus DNA (Center, pushed back slightly so UI takes priority)
                const mainDNA = createDNAStrand(45, 2.2, 0.55, 0x06b6d4, 0x8b5cf6, 0.4);
                mainDNA.position.z = -5;
                scene.add(mainDNA);

                // 2. Left DNA Strand (Close to camera, framing the login box)
                const leftDNA = createDNAStrand(60, 1.2, 0.45, 0x0ea5e9, 0x4f46e5, 0.8);
                leftDNA.position.set(-15, 0, 8); 
                scene.add(leftDNA);

                // 3. Right DNA Strand (Close to camera, framing the login box)
                const rightDNA = createDNAStrand(60, 1.2, 0.45, 0x9333ea, 0xec4899, 0.8);
                rightDNA.position.set(15, 0, 8); 
                scene.add(rightDNA);

                // 4. Chemical Molecular Rings (Rising Hexagons on far left and right)
                const hexGroup = new THREE.Group();
                const hexGeo = new THREE.TorusGeometry(1.4, 0.05, 5, 6); // 6 segments creates a hexagon
                const hexMat = new THREE.MeshPhysicalMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.5, wireframe: true, metalness: 0.8 });
                for(let i=0; i<24; i++) {
                    const hex = new THREE.Mesh(hexGeo, hexMat);
                    // Spawn exclusively on the left or right sides
                    const isLeft = Math.random() > 0.5;
                    const xPos = isLeft ? -16 - Math.random()*8 : 16 + Math.random()*8;
                    
                    hex.position.set(xPos, (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 15);
                    hex.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                    hex.userData = {
                        speedY: Math.random() * 0.06 + 0.02,
                        rotX: (Math.random() - 0.5) * 0.03,
                        rotY: (Math.random() - 0.5) * 0.03,
                        rotZ: (Math.random() - 0.5) * 0.03
                    };
                    hexGroup.add(hex);
                }
                scene.add(hexGroup);

                // 5. Floating Lab "Cells" / Virus structures (Wireframe Icosahedrons)
                const cellsGroup = new THREE.Group();
                const cellGeo = new THREE.IcosahedronGeometry(1.8, 1);
                const cellMat = new THREE.MeshPhysicalMaterial({ color: 0x22d3ee, wireframe: true, transparent: true, opacity: 0.15 });
                for(let i=0; i<8; i++) {
                    const cell = new THREE.Mesh(cellGeo, cellMat);
                    cell.position.set((Math.random() - 0.5) * 50, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 30 - 5);
                    cell.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                    // unique drifting speeds
                    cell.userData = { 
                        rx: (Math.random() - 0.5) * 0.005, 
                        ry: (Math.random() - 0.5) * 0.005, 
                        speed: Math.random() * 0.001 + 0.0005 
                    };
                    cellsGroup.add(cell);
                }
                scene.add(cellsGroup);

                // 5. Dynamic Microscopic Particles
                const particlesGroup = new THREE.Group();
                const floatGeo = new THREE.SphereGeometry(0.06, 8, 8);
                const floatMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4 });
                for(let i = 0; i < 150; i++) {
                    const m = new THREE.Mesh(floatGeo, floatMat);
                    m.position.set((Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 20);
                    // unique drifting paths
                    m.userData = { 
                        offset: Math.random() * Math.PI * 2, 
                        speedX: (Math.random() - 0.5) * 0.01,
                        speedY: (Math.random() - 0.5) * 0.01
                    };
                    particlesGroup.add(m);
                }
                scene.add(particlesGroup);

                camera.position.z = 22;

                // --- Animation Loop ---
                let reqId;
                const animate = () => {
                    reqId = requestAnimationFrame(animate);
                    
                    const time = Date.now();

                    // Main DNA Animation
                    mainDNA.rotation.y += 0.002; 
                    mainDNA.rotation.x = Math.sin(time * 0.0005) * 0.05; 
                    mainDNA.position.y = Math.sin(time * 0.001) * 0.8; 

                    // Left and Right Framing DNA Animations
                    leftDNA.rotation.y -= 0.006; // Spin relatively fast
                    leftDNA.position.y = Math.sin(time * 0.0015) * 1.5;
                    
                    rightDNA.rotation.y += 0.006; // Spin opposite direction
                    rightDNA.position.y = Math.cos(time * 0.0015) * 1.5;

                    // Chemical Hexagons Rising Animation
                    hexGroup.children.forEach(hex => {
                        hex.position.y += hex.userData.speedY;
                        hex.rotation.x += hex.userData.rotX;
                        hex.rotation.y += hex.userData.rotY;
                        hex.rotation.z += hex.userData.rotZ;
                        
                        // Reset position to bottom once they float off top
                        if (hex.position.y > 25) {
                            hex.position.y = -25;
                            // Randomly spawn on left or right edge again
                            hex.position.x = (Math.random() > 0.5) ? -16 - Math.random()*8 : 16 + Math.random()*8;
                        }
                    });

                    // Floating Cells Animation
                    cellsGroup.children.forEach(cell => {
                        cell.rotation.x += cell.userData.rx;
                        cell.rotation.y += cell.userData.ry;
                        cell.position.y += Math.sin(time * cell.userData.speed) * 0.01;
                    });

                    // Particles Drifting Physics
                    particlesGroup.children.forEach((p) => {
                        p.position.x += p.userData.speedX;
                        p.position.y += Math.sin(time * 0.002 + p.userData.offset) * 0.01 + p.userData.speedY;
                        
                        // Screen wrapping for infinite flow
                        if (p.position.x > 20) p.position.x = -20;
                        if (p.position.x < -20) p.position.x = 20;
                        if (p.position.y > 20) p.position.y = -20;
                        if (p.position.y < -20) p.position.y = 20;
                    });

                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(reqId);
                    window.removeEventListener('resize', handleResize);
                    if (container.contains(renderer.domElement)) {
                        container.removeChild(renderer.domElement);
                    }
                    renderer.dispose();
                };
            }, []);
            return null;
        };

        // --- Safe Icon Component ---
        const Icon = ({ name, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center align-middle ${className}`} style={{ minWidth: '1em', minHeight: '1em' }}></span>;
        };

        // --- Edit Modal Component ---
        const EditModal = ({ record, onClose, onSave, isSaving }) => {
            const [editData, setEditData] = useState(record);
            const handleChange = (e) => setEditData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleSubmit = (e) => { e.preventDefault(); onSave(editData); };

            return (
                <div className="modal-overlay">
                    <div className="glass-panel p-8 w-full max-w-lg border border-cyan-500 shadow-2xl animate-[fadeIn_0.3s]">
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2">
                            <Icon name="edit" className="text-cyan-400 w-6 h-6" /> Edit Record
                        </h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] uppercase text-slate-500 font-bold">Date</label><input type="date" name="date" value={editData.date} onChange={handleChange} className="w-full input-field rounded-lg p-2.5 text-sm" required /></div>
                                <div><label className="text-[10px] uppercase text-slate-500 font-bold">Lab Revenue</label><input type="number" name="sales" value={editData.sales} onChange={handleChange} className="w-full input-field rounded-lg p-2.5 text-sm font-mono" /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] uppercase text-slate-500 font-bold">Expense</label><input type="number" name="expense" value={editData.expense} onChange={handleChange} className="w-full input-field rounded-lg p-2.5 text-sm font-mono" /></div>
                                <div><label className="text-[10px] uppercase text-slate-500 font-bold">Refund</label><input type="number" name="refund" value={editData.refund} onChange={handleChange} className="w-full input-field rounded-lg p-2.5 text-sm font-mono" /></div>
                            </div>
                             <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] uppercase text-slate-500 font-bold">Dues</label><input type="number" name="dues" value={editData.dues} onChange={handleChange} className="w-full input-field rounded-lg p-2.5 text-sm font-mono" /></div>
                                <div><label className="text-[10px] uppercase text-slate-500 font-bold">Bank Deposit</label><input type="number" name="bankDeposit" value={editData.bankDeposit} onChange={handleChange} className="w-full input-field rounded-lg p-2.5 text-sm font-mono" /></div>
                            </div>
                            <div className="flex gap-3 pt-4">
                                <button type="button" onClick={onClose} className="flex-1 py-3 border border-slate-600 rounded-lg text-slate-300 font-bold text-xs uppercase hover:bg-white/5 transition-all">Cancel</button>
                                <button type="submit" disabled={isSaving} className="flex-1 py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white font-bold text-xs uppercase shadow-lg transition-all">{isSaving ? 'Saving...' : 'Update Record'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // --- Audit Changes Component ---
        const AuditChanges = ({ changes }) => {
            const [isOpen, setIsOpen] = useState(false);
            if (!changes || !changes.old || !changes.new) return <span className="text-slate-500 italic">No details</span>;
            const diffs = Object.keys(changes.new).filter(k => changes.old[k] != changes.new[k] && k !== 'dayPL' && k !== 'cashHand').map(key => ({ key, old: changes.old[key], new: changes.new[key] }));
            if (diffs.length === 0) return <span className="text-slate-500 italic">No value changes</span>;

            return (
                <div className="text-[10px]">
                    <button onClick={() => setIsOpen(!isOpen)} className="text-cyan-400 hover:text-cyan-300 underline font-bold">{isOpen ? 'Hide Details' : 'View Changes'}</button>
                    {isOpen && (
                        <div className="mt-2 bg-black/40 p-2 rounded border border-white/5 space-y-1">
                            {diffs.map((d, i) => (
                                <div key={i} className="flex justify-between gap-4 border-b border-white/5 pb-1 last:border-0 last:pb-0">
                                    <span className="text-slate-400 uppercase">{d.key}:</span><span className="font-mono text-slate-200">{d.old} <span className="text-cyan-500">→</span> {d.new}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [role, setRole] = useState('staff'); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [records, setRecords] = useState([]);
            const [auditLogs, setAuditLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [dbError, setDbError] = useState(null);
            
            // UI States
            const [accessKey, setAccessKey] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [needsSetup, setNeedsSetup] = useState(false);
            const [needsCorrectKey, setNeedsCorrectKey] = useState(!currentAnonKey.startsWith('eyJ'));
            const [newApiKey, setNewApiKey] = useState('');
            const [editingRecord, setEditingRecord] = useState(null);

            const staffPass = 'mdc@1500';
            const adminPass = 'Fadmin';

            const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], sales: '', expense: '', refund: '', dues: '', bankDeposit: '' });

            // --- DATABASE FUNCTIONS ---
            const fetchRecords = useCallback(async () => {
                if (needsCorrectKey) return;

                try {
                    const { data, error } = await supabaseClient.from('pharmacy_records').select('*');
                    
                    if (error) {
                        if (error.code === 'PGRST205' || error.code === '42P01' || error.message.includes('Could not find the table')) {
                            setNeedsSetup(true);
                        } else {
                            throw error;
                        }
                    } else {
                        setDbError(null);
                        setNeedsSetup(false);
                        const mapped = (data || []).map(r => ({
                            id: r.id, date: String(r.date || ''), sales: Number(r.sales) || 0, expense: Number(r.expense) || 0,
                            refund: Number(r.refund) || 0, dues: Number(r.dues) || 0, bankDeposit: Number(r.bank_deposit) || 0,
                            dayPL: Number(r.day_pl) || 0, cashHand: Number(r.cash_hand) || 0
                        })).sort((a, b) => b.date.localeCompare(a.date));
                        setRecords(mapped);
                    }
                } catch (err) {
                    console.error("Supabase Error:", err);
                    if (err.message === 'Failed to fetch' || err.message.includes('fetch')) {
                        setNeedsCorrectKey(true);
                    } else {
                        setDbError(err.message || "Unknown error occurred");
                    }
                } finally {
                    setLoading(false);
                }
            }, [needsCorrectKey]);

            const fetchAuditLogs = useCallback(async () => {
                if (role !== 'admin' || needsCorrectKey) return;
                try {
                    const { data, error } = await supabaseClient.from('audit_logs').select('*').order('created_at', { ascending: false }).limit(50);
                    if (!error && data) setAuditLogs(data);
                } catch (err) {}
            }, [role, needsCorrectKey]);

            useEffect(() => {
                fetchRecords();
                if(role === 'admin') fetchAuditLogs();
                if (needsCorrectKey) return;

                const sub = supabaseClient.channel('realtime_sync')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'pharmacy_records' }, fetchRecords).subscribe();
                return () => supabaseClient.removeChannel(sub);
            }, [fetchRecords, fetchAuditLogs, role, needsCorrectKey]);

            // --- CALCULATIONS ---
            const stats = useMemo(() => {
                const s = records.reduce((acc, r) => ({
                    sales: acc.sales + r.sales, expense: acc.expense + r.expense, refund: acc.refund + r.refund,
                    bankDeposit: acc.bankDeposit + r.bankDeposit, dues: acc.dues + r.dues, cashHand: acc.cashHand + r.cashHand
                }), { sales: 0, expense: 0, refund: 0, bankDeposit: 0, dues: 0, cashHand: 0 });
                return { ...s, netProfit: s.sales - s.expense - s.refund }; // ACCURATE NET PROFIT CALCULATION
            }, [records]);

            const monthlySummary = useMemo(() => {
                const groups = {};
                records.forEach(r => {
                    const m = r.date ? r.date.substring(0, 7) : 'NA';
                    if (!groups[m]) groups[m] = { m, sales: 0, expense: 0, refund: 0, bankDeposit: 0, dues: 0, profit: 0 };
                    groups[m].sales += r.sales; groups[m].expense += r.expense; groups[m].refund += r.refund;
                    groups[m].bankDeposit += r.bankDeposit; groups[m].dues += r.dues;
                    groups[m].profit += (r.sales - r.expense - r.refund);
                });

                                                    </div>
                                                    <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Total Refund</div>
                                                        <div className="text-xl font-mono font-bold text-amber-400 mt-1">₹{fmt(stats.refund)}</div>
                                                    </div>
                                                    <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Total Banked</div>
                                                        <div className="text-xl font-mono font-bold text-indigo-400 mt-1">₹{fmt(stats.bankDeposit)}</div>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Ledger Table */}
                                            <div className="glass-panel overflow-hidden border-t-2 border-t-emerald-500">
                                                <div className="p-6 border-b border-white/5 flex flex-wrap justify-between items-center gap-4 bg-white/5">
                                                    <div>
                                                        <h4 className="text-sm font-bold uppercase tracking-wide">Detailed Transaction Ledger</h4>
                                                        <p className="text-[10px] text-slate-500 uppercase mt-1">Full database history</p>
                                                    </div>
                                                    <button onClick={downloadCSV} className="px-4 py-2 bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 hover:bg-emerald-600/30 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all flex items-center gap-2">
                                                        <Icon name="file-spreadsheet" className="w-4 h-4" /> Export Data
                                                    </button>
                                                </div>
                                                <div className="overflow-x-auto custom-scrollbar max-h-[500px]">
                                                    <table className="w-full text-left text-xs whitespace-nowrap">
                                                        <thead className="bg-[#050b14] text-slate-500 text-[10px] font-bold uppercase tracking-wider sticky top-0 z-10 shadow-sm border-b border-white/10">
                                                            <tr>
                                                                <th className="p-4 pl-6">Date</th>
                                                                <th className="p-4 text-right text-emerald-500/70">Lab Revenue</th>
                                                                <th className="p-4 text-right text-rose-500/70">Expense</th>
                                                                <th className="p-4 text-right text-amber-500/70">Refund</th>
                                                                <th className="p-4 text-right text-indigo-500/70">Banked</th>
                                                                <th className="p-4 text-right">Cash-in-Hand</th>
                                                                <th className="p-4 text-right">Daily P/L</th>
                                                                <th className="p-4 text-center">Action</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-white/5 font-mono">
                                                            {records.map(r => (
                                                                <tr key={r.id} className="hover:bg-white/5 transition-all group">
                                                                    <td className="p-4 pl-6 font-sans text-slate-300">{r.date}</td>
                                                                    <td className="p-4 text-right font-medium text-emerald-400">₹{fmt(r.sales)}</td>
                                                                    <td className="p-4 text-right text-rose-400">₹{fmt(r.expense)}</td>
                                                                    <td className="p-4 text-right text-amber-400">₹{fmt(r.refund)}</td>
                                                                    <td className="p-4 text-right text-indigo-400">₹{fmt(r.bankDeposit)}</td>
                                                                    <td className="p-4 text-right text-white font-bold">₹{fmt(r.cashHand)}</td>
                                                                    <td className={`p-4 text-right font-bold ${r.dayPL >= 0 ? 'text-cyan-400' : 'text-rose-500'}`}>₹{fmt(r.dayPL)}</td>
                                                                    <td className="p-4 text-center">
                                                                        <div className="flex items-center justify-center gap-2">
                                                                            <button onClick={() => setEditingRecord(r)} className="p-2 text-cyan-400 hover:bg-cyan-500/20 rounded opacity-0 group-hover:opacity-100 transition-all" title="Edit Entry">
                                                                                <Icon name="edit-2" className="w-4 h-4" />
                                                                            </button>
                                                                            {role === 'admin' && (
                                                                                <button onClick={() => handleDelete(r.id)} className="p-2 text-rose-500 hover:bg-rose-500/20 rounded opacity-0 group-hover:opacity-100 transition-all" title="Delete Entry">
                                                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                                                </button>
                                                                            )}
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            {/* Monthly Breakdown Table */}
                                            <div className="glass-panel overflow-hidden border-t-2 border-t-sky-500">
                                                <div className="p-6 border-b border-white/5 flex flex-wrap justify-between items-center gap-4 bg-white/5">
                                                    <div>
                                                        <h4 className="text-sm font-bold uppercase tracking-wide">Monthly Aggregate Report</h4>
                                                        <p className="text-[10px] text-slate-500 uppercase mt-1">Full breakdown of all monthly totals</p>
                                                    </div>
                                                </div>
                                                <div className="overflow-x-auto custom-scrollbar">
                                                    <table className="w-full text-left text-xs whitespace-nowrap">
                                                        <thead className="bg-black/20 text-slate-500 text-[10px] font-bold uppercase tracking-wider">
                                                            <tr>
                                                                <th className="p-4 pl-6">Month</th>
                                                                <th className="p-4 text-right text-emerald-500/70">Total Income</th>
                                                                <th className="p-4 text-right text-rose-500/70">Total Expense</th>
                                                                <th className="p-4 text-right text-amber-500/70">Total Refund</th>
                                                                <th className="p-4 text-right text-indigo-500/70">Total Bank Deposit</th>
                                                                <th className="p-4 text-right">Net Profit</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-white/5 font-mono">
                                                            {monthlySummary.map(m => (
                                                                <tr key={m.m} className="hover:bg-white/5 transition-all">
                                                                    <td className="p-4 pl-6 font-sans text-slate-300 font-bold">{m.m}</td>
                                                                    <td className="p-4 text-right font-medium text-emerald-400">₹{fmt(m.sales)}</td>
                                                                    <td className="p-4 text-right text-rose-400">₹{fmt(m.expense)}</td>
                                                                    <td className="p-4 text-right text-amber-400">₹{fmt(m.refund)}</td>
                                                                    <td className="p-4 text-right text-indigo-400">₹{fmt(m.bankDeposit)}</td>
                                                                    <td className={`p-4 text-right font-bold ${m.profit >= 0 ? 'text-cyan-400' : 'text-rose-500'}`}>₹{fmt(m.profit)}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        // Admin Tab
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-[zoomIn_0.3s_ease-out]">
                                            <div className="glass-panel p-8 border-t-2 border-t-indigo-500 flex flex-col items-center text-center space-y-6">
                                                <div className="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center border border-indigo-500/20">
                                                    <Icon name="shield-check" className="w-8 h-8 text-indigo-400" />
                                                </div>
                                                <div>
                                                    <h3 className="text-lg font-bold uppercase tracking-tight text-white">Security Credentials</h3>
                                                    <p className="text-xs text-slate-500 mt-2 max-w-xs mx-auto">System access keys.</p>
                                                </div>
                                                <div className="w-full bg-black/20 rounded-xl p-4 border border-white/5 space-y-3">
                                                    <div className="flex justify-between items-center px-4">
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Staff Key</span>
                                                        <code className="text-emerald-400 font-mono text-sm bg-emerald-400/10 px-2 py-1 rounded">{staffPass}</code>
                                                    </div>
                                                    <div className="h-px bg-white/5 w-full"></div>
                                                    <div className="flex justify-between items-center px-4">
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Admin Key</span>
                                                        <code className="text-indigo-400 font-mono text-sm bg-indigo-400/10 px-2 py-1 rounded">{adminPass}</code>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="glass-panel p-8 border-t-2 border-t-cyan-500 flex flex-col items-center text-center space-y-6">
                                                <div className="w-16 h-16 rounded-2xl bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20">
                                                    <Icon name="database" className="w-8 h-8 text-cyan-400" />
                                                </div>
                                                <div>
                                                    <h3 className="text-lg font-bold uppercase tracking-tight text-white">Cloud Database</h3>
                                                    <p className="text-xs text-slate-500 mt-2">Direct access to Supabase console.</p>
                                                </div>
                                                <button onClick={() => window.open('https://supabase.com/dashboard/project/ttrxyxrssgzlyforxage/editor', '_blank')} className="w-full py-4 rounded-xl border border-slate-700 hover:border-cyan-500/50 hover:bg-cyan-500/10 text-slate-300 hover:text-white transition-all text-xs font-bold uppercase tracking-widest">
                                                    Open Database Console
                                                </button>
                                                <button onClick={() => { localStorage.removeItem('mdc_anon_key_v2'); window.location.reload(); }} className="text-[10px] text-rose-400 hover:text-rose-300 underline font-bold uppercase mt-2 block">
                                                    Reset API Key Connection
                                                </button>
                                            </div>
                                            
                                            {/* Audit Log Section */}
                                            <div className="md:col-span-2 glass-panel p-6 border-t-2 border-t-rose-500">
                                                <div className="flex items-center gap-2 mb-6">
                                                    <Icon name="history" className="text-rose-400 w-5 h-5" />
                                                    <h4 className="text-sm font-bold uppercase tracking-wide">System Audit Trail</h4>
                                                </div>
                                                <div className="overflow-x-auto custom-scrollbar max-h-80">
                                                    <table className="w-full text-left text-xs">
                                                        <thead className="text-slate-500 sticky top-0 bg-[#0d121e] z-10 shadow-sm">
                                                            <tr>
                                                                <th className="pb-2 pl-2 border-b border-white/10">Time</th>
                                                                <th className="pb-2 border-b border-white/10">User</th>
                                                                <th className="pb-2 border-b border-white/10">Action</th>
                                                                <th className="pb-2 border-b border-white/10">Details</th>
                                                                <th className="pb-2 text-right pr-2 border-b border-white/10">Record ID</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="font-mono text-[10px] divide-y divide-white/5">
                                                            {auditLogs.length > 0 ? auditLogs.map(log => (
                                                                <tr key={log.id} className="hover:bg-white/5">
                                                                    <td className="py-3 pl-2 text-slate-400 align-top">{new Date(log.created_at).toLocaleString()}</td>
                                                                    <td className="py-3 text-cyan-400 uppercase align-top">{log.performed_by}</td>
                                                                    <td className="py-3 text-amber-400 align-top">{log.action}</td>
                                                                    <td className="py-3 align-top">
                                                                        <AuditChanges changes={log.changes} />
                                                                    </td>
                                                                    <td className="py-3 pr-2 text-right text-slate-500 align-top">#{log.record_id}</td>
                                                                </tr>
                                                            )) : (
                                                                <tr><td colSpan="5" className="py-4 text-center text-slate-500 italic">No audit logs found.</td></tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </main>
                                
                                {/* Edit Modal */}
                                {editingRecord && (
                                    <EditModal 
                                        record={editingRecord} 
                                        onClose={() => setEditingRecord(null)} 
                                        onSave={handleUpdateRecord} 
                                        isSaving={isSaving}
                                    />
                                )}
                            </>
                        )}
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
